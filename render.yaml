services:
  - type: web
    name: github-release-notification-api
    runtime: docker
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GRPC_PORT
        value: 50051
      - key: GITHUB_TOKEN
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CACHE_TTL_SECONDS
        value: 600
      - key: SCAN_INTERVAL_SECONDS
        value: 300
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: API_KEY
        sync: false
